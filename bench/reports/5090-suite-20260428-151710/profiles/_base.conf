# llama-server config for NVIDIA RTX 5090 (32GB VRAM)

# ── Model profile selection ─────────────────────────────────────────────────
# Default to Qwen3.6-27B on this GPU and keep the other overlays available for
# manual selection.
DEFAULT_MODEL_PROFILE="qwen36-27b"
SUPPORTED_MODEL_PROFILES="qwen36-27b qwen36-27B-AEON qwen36-35B-A3B qwen36-35B-A3B-q4-ngram mythos"

# ── Network ──────────────────────────────────────────────────────────────────
# 0.0.0.0 = accessible from Windows host and LAN.
HOST="0.0.0.0"
PORT=9999

# ── Authentication ───────────────────────────────────────────────────────────
# Leave API_KEY unset or empty to disable bearer auth entirely.
# Set it before exposing the service beyond localhost or a trusted LAN.
# API_KEY="replace-this-key"

# ── GPU / Performance ────────────────────────────────────────────────────────
# Number of layers to offload to GPU. 99 = all layers.
GPU_LAYERS=99

# Context length in tokens. Kept here so the GPU config owns hardware limits.
CONTEXT_LENGTH=131072

# Number of parallel request slots. 1 = single user.
PARALLEL_SLOTS=1

# Flash attention — faster and uses less memory.
FLASH_ATTENTION="on"

# Quantize the KV cache to save VRAM, allowing much longer context.
# Options: f16 (default), q8_0, q4_0. q4_0 is most aggressive.
# REF: https://x.com/no_stp_on_snek/status/2039089641043755036
CACHE_TYPE_K="q8_0"
CACHE_TYPE_V="q4_0"
