name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy llms

      - name: Config lint
        run: uv run llms config lint

      - name: Pytest
        run: uv run pytest tests/

      - name: Shellcheck (warning-level)
        run: shellcheck -S warning setup.sh scripts/*.sh
