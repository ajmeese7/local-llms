# vLLM config for NVIDIA RTX 5060 Ti (16GB VRAM)
# Docs: https://docs.vllm.ai/en/latest/serving/openai_compatible_server.html

# ── Model ────────────────────────────────────────────────────────────────────
# HuggingFace model ID or local path. Downloaded automatically on first start.
# With 16GB VRAM, models up to ~14B parameters fit well.
model: "huihui-ai/Huihui-Qwen3.5-9B-abliterated"

# ── Network ──────────────────────────────────────────────────────────────────
host: "0.0.0.0"
port: 8000

# ── Authentication ───────────────────────────────────────────────────────────
api-key: "change-this-key"

# ── GPU / Memory ─────────────────────────────────────────────────────────────
# 0.90 is fine — vLLM handles the budget internally.
gpu-memory-utilization: 0.90

# 16GB VRAM fits 16384 comfortably for most 7-14B models.
# Increase to 32768 if the model supports it; reduce if you hit OOM.
max-model-len: 16384

# ── Generation ───────────────────────────────────────────────────────────────
generation-config: "vllm"

# ── Logging ──────────────────────────────────────────────────────────────────
uvicorn-log-level: "info"
