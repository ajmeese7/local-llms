# llama-server config for NVIDIA RTX 5090 (32GB VRAM)

# ── Model ────────────────────────────────────────────────────────────────────
# Local path to the GGUF file. Downloaded by setup.sh.
MODEL="$HOME/models/Qwen3.5-27B.Q4_K_M.gguf"

# HuggingFace repo and filename (used by setup.sh to download the model).
HF_REPO="Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-GGUF"
HF_FILE="Qwen3.5-27B.Q4_K_M.gguf"

# Model alias reported by the API (instead of the filename).
ALIAS="Qwen3.5-27B"

# ── Network ──────────────────────────────────────────────────────────────────
# 0.0.0.0 = accessible from Windows host and LAN.
HOST="0.0.0.0"
PORT=8000

# ── Authentication ───────────────────────────────────────────────────────────
# API key required for all requests (sent as "Authorization: Bearer <key>").
API_KEY="change-this-key"

# ── GPU / Performance ────────────────────────────────────────────────────────
# Number of layers to offload to GPU. 99 = all layers.
GPU_LAYERS=99

# Context length in tokens. Q4_K_M (16.5GB weights) leaves plenty of VRAM
# for a large KV cache, especially with quantized cache types below.
CONTEXT_LENGTH=131072

# Number of parallel request slots. 1 = single user.
PARALLEL_SLOTS=1

# Flash attention — faster and uses less memory.
FLASH_ATTENTION="on"

# Quantize the KV cache to save VRAM, allowing much longer context.
# Options: f16 (default), q8_0, q4_0. q4_0 is most aggressive.
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"
