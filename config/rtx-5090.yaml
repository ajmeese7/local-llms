# vLLM config for NVIDIA RTX 5090 (32GB VRAM)
# Docs: https://docs.vllm.ai/en/latest/serving/openai_compatible_server.html

# ── Model ────────────────────────────────────────────────────────────────────
# HuggingFace model ID or local path. Downloaded automatically on first start.
# Examples: huihui-ai/Huihui-Qwen3.5-9B-abliterated, Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-GGUF
model: "Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-GGUF"

# ── Network ──────────────────────────────────────────────────────────────────
# 0.0.0.0 = accessible from Windows host and LAN.
# Use 127.0.0.1 to restrict to WSL-only access.
host: "0.0.0.0"
port: 8000

# ── Authentication ───────────────────────────────────────────────────────────
# API key required for all requests (sent as "Authorization: Bearer <key>").
# Change this to something unique before starting the service.
api-key: "change-this-key"

# ── GPU / Memory ─────────────────────────────────────────────────────────────
# Fraction of GPU VRAM vLLM may use. 0.90 leaves headroom for the OS/display.
gpu-memory-utilization: 0.90

# Maximum context length in tokens. 32768 fits comfortably in 32GB VRAM for
# most 7-30B models. Reduce if you hit OOM; increase if the model supports it
# and VRAM allows.
max-model-len: 32768

# ── Generation ───────────────────────────────────────────────────────────────
# "vllm" = use vLLM built-in defaults instead of the model repo's
# generation_config.json, which can silently override temperature/top_p/etc.
generation-config: "vllm"

# ── Logging ──────────────────────────────────────────────────────────────────
# Set to "debug" for verbose output, "warning" to reduce noise.
uvicorn-log-level: "info"
