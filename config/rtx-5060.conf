# llama-server config for NVIDIA RTX 5060 Ti (16GB VRAM)

# ── Model ────────────────────────────────────────────────────────────────────
# Local path to the GGUF file. Downloaded by setup.sh.
MODEL="$HOME/models/Qwen3.5-9B.Q4_K_M.gguf"

# HuggingFace repo and filename (used by setup.sh to download the model).
HF_REPO="huihui-ai/Huihui-Qwen3.5-9B-abliterated-GGUF"
HF_FILE="huihui-qwen3.5-9b-abliterated-q4_k_m.gguf"

# Model alias reported by the API (instead of the filename).
ALIAS="Qwen3.5-9B"

# ── Network ──────────────────────────────────────────────────────────────────
HOST="0.0.0.0"
PORT=8000

# ── Authentication ───────────────────────────────────────────────────────────
API_KEY="change-this-key"

# ── GPU / Performance ────────────────────────────────────────────────────────
GPU_LAYERS=99
CONTEXT_LENGTH=32768
PARALLEL_SLOTS=1
FLASH_ATTENTION="on"
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"
