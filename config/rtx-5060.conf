# llama-server config for NVIDIA RTX 5060 Ti (16GB VRAM)

# ── Model profile selection ─────────────────────────────────────────────────
# Default model profile selection for this GPU.
DEFAULT_MODEL_PROFILE="qwen35-9b"
SUPPORTED_MODEL_PROFILES="qwen35-9b gemma4-e4b-obliterated"

# ── Network ──────────────────────────────────────────────────────────────────
HOST="0.0.0.0"
PORT=8000

# ── Authentication ───────────────────────────────────────────────────────────
API_KEY="change-this-key"

# ── GPU / Performance ────────────────────────────────────────────────────────
GPU_LAYERS=99

# Context length in tokens. Kept here so the GPU config owns hardware limits.
CONTEXT_LENGTH=32768

PARALLEL_SLOTS=1
FLASH_ATTENTION="on"
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"
