# llama-server model overlay for Qwen3.6-35B-A3B Q4_K_P with ngram-mod speculation

# ── Model ────────────────────────────────────────────────────────────────────
MODEL="$HOME/models/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_P.gguf"
HF_REPO="HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive"
HF_FILE="Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_P.gguf"
ALIAS="Qwen3.6-35B-A3B-Q4-ngram"
JINJA="on"
PROVEN_LLAMA_PROVIDERS="llama.cpp"
PROVIDER_COMPATIBILITY_NOTES="ngram-mod profile is proven only on llama.cpp; ik_llama.cpp support is unproven and should be retested before benchmarking."

# Optional multimodal projector. Uncomment both lines if you want llama-server
# to load the projector and expose multimodal inputs for this profile.
# MMPROJ="$HOME/models/mmproj-Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-f16.gguf"
# MMPROJ_HF_FILE="mmproj-Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-f16.gguf"

# Experimental long-context speculative setup from recent ngram-mod guidance.
CONTEXT_LENGTH=262144
PARALLEL_SLOTS=4
CACHE_TYPE_K="f16"
CACHE_TYPE_V="f16"
KV_UNIFIED="on"
SPEC_TYPE="ngram-mod"
SPEC_NGRAM_SIZE_N=24
DRAFT_MAX=48
DRAFT_MIN=12

# Newer llama.cpp builds also support this shortcut, equivalent to:
# --spec-ngram-size-n 24 --draft-max 64 --draft-min 48
# Use this instead of the explicit SPEC_TYPE/SPEC_NGRAM_SIZE_N/DRAFT_* block
# above if you want the upstream default speculative settings.
# SPEC_DEFAULT="on"

# Recommended thinking-mode defaults.
TEMPERATURE=1.0
TOP_P=0.95
TOP_K=20
MIN_P=0
PRESENCE_PENALTY=1.5
