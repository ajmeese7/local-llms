<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="local-llms: bench-driven local inference. Two backends, five eval suites, CUDA 12.x, OpenAI-compatible API.">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0A0A0A"/>
      <stop offset="55%"  stop-color="#050505"/>
      <stop offset="100%" stop-color="#080010"/>
    </linearGradient>
    <linearGradient id="magentaWash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D600FF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#D600FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyanWash" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#00B8FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00B8FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#D600FF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#D600FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00B8FF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <pattern id="scanlines" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="transparent"/>
      <rect width="3" height="1" fill="#ffffff" fill-opacity="0.025"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .mono  { font-family: 'JetBrains Mono','Fira Code','SF Mono','Consolas','Monaco',monospace; }
      .title { font-weight: 800; letter-spacing: 0.05em; }
      .stat  { font-weight: 800; letter-spacing: 0.02em; }
      .meta  { font-weight: 500; letter-spacing: 0.24em; text-transform: uppercase; }
      .lbl   { font-weight: 500; letter-spacing: 0.10em; text-transform: uppercase; }
      .tag   { font-weight: 500; letter-spacing: 0.04em; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#scanlines)"/>
  <rect x="0" y="0"   width="1280" height="320" fill="url(#magentaWash)"/>
  <rect x="0" y="320" width="1280" height="320" fill="url(#cyanWash)"/>

  <!-- corner brackets -->
  <g stroke-width="2.5" fill="none">
    <path d="M44 44 L44 84 M44 44 L84 44" stroke="#D600FF" stroke-opacity="0.9"/>
    <path d="M1236 44 L1236 84 M1236 44 L1196 44" stroke="#00B8FF" stroke-opacity="0.9"/>
    <path d="M44 596 L44 556 M44 596 L84 596" stroke="#00B8FF" stroke-opacity="0.9"/>
    <path d="M1236 596 L1236 556 M1236 596 L1196 596" stroke="#D600FF" stroke-opacity="0.9"/>
  </g>

  <!-- meta strip -->
  <g class="mono meta" font-size="14">
    <text x="100" y="92"  fill="#7A7A85">// LOCAL INFERENCE</text>
    <text x="1180" y="92" fill="#7A7A85" text-anchor="end">github.com/ajmeese7/local-llms</text>
  </g>
  <line x1="100" y1="108" x2="1180" y2="108" stroke="url(#sweep)" stroke-width="1.5"/>

  <!-- title with chromatic split -->
  <g class="mono title" font-size="124">
    <text x="98" y="240"  fill="#D600FF" fill-opacity="0.7" filter="url(#softGlow)">local-llms</text>
    <text x="102" y="244" fill="#00B8FF" fill-opacity="0.7" filter="url(#softGlow)">local-llms</text>
    <text x="98" y="240"  fill="#D600FF" fill-opacity="0.55">local-llms</text>
    <text x="102" y="244" fill="#00B8FF" fill-opacity="0.55">local-llms</text>
    <text x="100" y="242" fill="#FFFFFF">local-llms</text>
  </g>

  <!-- tagline -->
  <g class="mono tag" font-size="22">
    <text x="100" y="288" fill="#C9C9D1">
      <tspan fill="#D600FF">&gt; </tspan>bench-driven local inference  ·  your GPU, your model, your endpoint
    </text>
  </g>

  <!-- stat cards -->
  <!-- card: width 264, height 168, y=336, gap=24. 4 cards = 4*264 + 3*24 = 1128, x-start = (1280-1128)/2 = 76 -->
  <g class="mono">
    <!-- 2 backends -->
    <g transform="translate(76,336)">
      <rect width="264" height="168" rx="8" fill="#0A0A0A" stroke="#D600FF" stroke-opacity="0.85"/>
      <rect width="264" height="168" rx="8" fill="#D600FF" fill-opacity="0.04"/>
      <text x="132" y="92"  class="stat" font-size="84" fill="#FFFFFF" text-anchor="middle">2</text>
      <text x="132" y="124" class="lbl"  font-size="13" fill="#D600FF" text-anchor="middle">BACKENDS</text>
      <text x="132" y="148" class="tag"  font-size="12" fill="#C9C9D1" text-anchor="middle">llama.cpp + ik_llama.cpp</text>
    </g>

    <!-- 5 evals -->
    <g transform="translate(364,336)">
      <rect width="264" height="168" rx="8" fill="#0A0A0A" stroke="#00B8FF" stroke-opacity="0.85"/>
      <rect width="264" height="168" rx="8" fill="#00B8FF" fill-opacity="0.04"/>
      <text x="132" y="92"  class="stat" font-size="84" fill="#FFFFFF" text-anchor="middle">5</text>
      <text x="132" y="124" class="lbl"  font-size="13" fill="#00B8FF" text-anchor="middle">EVAL SUITES</text>
      <text x="132" y="148" class="tag"  font-size="12" fill="#C9C9D1" text-anchor="middle">mmlu · gsm8k · niah · …</text>
    </g>

    <!-- CUDA 12.x -->
    <g transform="translate(652,336)">
      <rect width="264" height="168" rx="8" fill="#0A0A0A" stroke="#19F0A8" stroke-opacity="0.75"/>
      <rect width="264" height="168" rx="8" fill="#19F0A8" fill-opacity="0.04"/>
      <text x="132" y="98"  class="stat" font-size="56" fill="#FFFFFF" text-anchor="middle">CUDA</text>
      <text x="132" y="124" class="lbl"  font-size="13" fill="#19F0A8" text-anchor="middle">12.x  ::  NVIDIA</text>
      <text x="132" y="148" class="tag"  font-size="12" fill="#C9C9D1" text-anchor="middle">Linux  ·  WSL2</text>
    </g>

    <!-- OpenAI API -->
    <g transform="translate(940,336)">
      <rect width="264" height="168" rx="8" fill="#0A0A0A" stroke="#FFC857" stroke-opacity="0.75"/>
      <rect width="264" height="168" rx="8" fill="#FFC857" fill-opacity="0.04"/>
      <text x="132" y="98"  class="stat" font-size="42" fill="#FFFFFF" text-anchor="middle">OpenAI</text>
      <text x="132" y="124" class="lbl"  font-size="13" fill="#FFC857" text-anchor="middle">COMPATIBLE API</text>
      <text x="132" y="148" class="tag"  font-size="12" fill="#C9C9D1" text-anchor="middle">/v1/chat/completions</text>
    </g>
  </g>

  <!-- footer line -->
  <line x1="100" y1="548" x2="1180" y2="548" stroke="#ffffff" stroke-opacity="0.08"/>
  <g class="mono" font-size="16">
    <text x="100"  y="580" fill="#C9C9D1" class="tag">
      systemd-managed  ·  reproducible benchmarks  ·  zero vendor lock-in
    </text>
    <text x="1180" y="580" fill="#7A7A85" class="meta" font-size="12" text-anchor="end">MIT licensed</text>
  </g>
</svg>
