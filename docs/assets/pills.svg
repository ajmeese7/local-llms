<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60" role="img" aria-label="Feature badges: CUDA, systemd, OpenAI API, llama.cpp, ik_llama.cpp, RTX-class">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono','Fira Code','SF Mono','Consolas','Monaco',monospace; font-weight: 600; letter-spacing: 0.10em; }
    </style>
    <filter id="pillGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <rect width="1200" height="60" fill="#050505"/>

  <!-- 6 pills, evenly spaced -->
  <!-- Pill template: rect with neon border, dot, label.
       Width 184, height 36, gap 12. Total = 6*184 + 5*12 = 1164, x-start = (1200-1164)/2 = 18 -->

  <g class="mono" font-size="12" transform="translate(18,12)">

    <!-- CUDA  (magenta) -->
    <g transform="translate(0,0)">
      <rect width="184" height="36" rx="18" fill="#0A0A0A" stroke="#D600FF" stroke-opacity="0.85"/>
      <circle cx="18" cy="18" r="4" fill="#D600FF" filter="url(#pillGlow)"/>
      <circle cx="18" cy="18" r="3" fill="#D600FF"/>
      <text x="34" y="22" fill="#FFFFFF">CUDA 12.x</text>
    </g>

    <!-- systemd  (cyan) -->
    <g transform="translate(196,0)">
      <rect width="184" height="36" rx="18" fill="#0A0A0A" stroke="#00B8FF" stroke-opacity="0.85"/>
      <circle cx="18" cy="18" r="4" fill="#00B8FF" filter="url(#pillGlow)"/>
      <circle cx="18" cy="18" r="3" fill="#00B8FF"/>
      <text x="34" y="22" fill="#FFFFFF">systemd</text>
    </g>

    <!-- OpenAI API  (success) -->
    <g transform="translate(392,0)">
      <rect width="184" height="36" rx="18" fill="#0A0A0A" stroke="#19F0A8" stroke-opacity="0.75"/>
      <circle cx="18" cy="18" r="4" fill="#19F0A8" filter="url(#pillGlow)"/>
      <circle cx="18" cy="18" r="3" fill="#19F0A8"/>
      <text x="34" y="22" fill="#FFFFFF">OpenAI API</text>
    </g>

    <!-- llama.cpp  (magenta) -->
    <g transform="translate(588,0)">
      <rect width="184" height="36" rx="18" fill="#0A0A0A" stroke="#D600FF" stroke-opacity="0.85"/>
      <circle cx="18" cy="18" r="4" fill="#D600FF" filter="url(#pillGlow)"/>
      <circle cx="18" cy="18" r="3" fill="#D600FF"/>
      <text x="34" y="22" fill="#FFFFFF">llama.cpp</text>
    </g>

    <!-- ik_llama.cpp  (cyan) -->
    <g transform="translate(784,0)">
      <rect width="184" height="36" rx="18" fill="#0A0A0A" stroke="#00B8FF" stroke-opacity="0.85"/>
      <circle cx="18" cy="18" r="4" fill="#00B8FF" filter="url(#pillGlow)"/>
      <circle cx="18" cy="18" r="3" fill="#00B8FF"/>
      <text x="34" y="22" fill="#FFFFFF">ik_llama.cpp</text>
    </g>

    <!-- RTX-class  (warning) -->
    <g transform="translate(980,0)">
      <rect width="184" height="36" rx="18" fill="#0A0A0A" stroke="#FFC857" stroke-opacity="0.75"/>
      <circle cx="18" cy="18" r="4" fill="#FFC857" filter="url(#pillGlow)"/>
      <circle cx="18" cy="18" r="3" fill="#FFC857"/>
      <text x="34" y="22" fill="#FFFFFF">RTX-class GPU</text>
    </g>

  </g>
</svg>
