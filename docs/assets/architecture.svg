<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-label="local-llms architecture: CLI and evals call the OpenAI-compatible API exposed by llama-server, which systemd manages on top of llama.cpp or ik_llama.cpp running on a CUDA-enabled NVIDIA GPU.">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <filter id="glowM" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <marker id="arrowM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#D600FF" fill-opacity="0.85"/>
    </marker>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#00B8FF" fill-opacity="0.85"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7A7A85"/>
    </marker>
    <style>
      .mono  { font-family: 'JetBrains Mono','Fira Code','SF Mono','Consolas','Monaco',monospace; }
      .h     { font-weight: 700; letter-spacing: 0.04em; }
      .meta  { font-weight: 500; letter-spacing: 0.20em; text-transform: uppercase; }
      .lbl   { font-weight: 500; letter-spacing: 0.04em; }
      .sub   { font-weight: 400; letter-spacing: 0.04em; }
    </style>
  </defs>

  <rect width="1200" height="640" fill="url(#bgGrad)"/>
  <rect width="1200" height="640" fill="url(#grid)"/>

  <!-- header -->
  <g class="mono">
    <text x="40" y="42" class="meta" font-size="11" fill="#7A7A85">// ARCHITECTURE</text>
    <text x="40" y="78" class="h" font-size="22" fill="#FFFFFF">how it fits together</text>
    <line x1="40" y1="92" x2="1160" y2="92" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <!-- ====== Layer 1: clients (CLI / evals / hub) ====== -->
  <g class="mono">
    <text x="40" y="124" class="meta" font-size="10" fill="#7A7A85">L1  ::  CLIENTS</text>
  </g>

  <!-- CLI -->
  <g transform="translate(40,140)">
    <rect width="260" height="76" rx="6" fill="#0A0A0A" stroke="#00B8FF" stroke-opacity="0.85"/>
    <text x="16" y="28" class="mono lbl" font-size="14" fill="#FFFFFF">llms CLI</text>
    <text x="16" y="50" class="mono sub" font-size="11" fill="#C9C9D1">endpoint  ·  model  ·  config</text>
    <text x="16" y="66" class="mono sub" font-size="11" fill="#7A7A85">provider  ·  launcher</text>
  </g>
  <!-- evals -->
  <g transform="translate(330,140)">
    <rect width="260" height="76" rx="6" fill="#0A0A0A" stroke="#D600FF" stroke-opacity="0.85"/>
    <text x="16" y="28" class="mono lbl" font-size="14" fill="#FFFFFF">eval harness</text>
    <text x="16" y="50" class="mono sub" font-size="11" fill="#C9C9D1">local_smoke · mmlu · gsm8k</text>
    <text x="16" y="66" class="mono sub" font-size="11" fill="#7A7A85">niah · frontend_agentic</text>
  </g>
  <!-- hub -->
  <g transform="translate(620,140)">
    <rect width="260" height="76" rx="6" fill="#0A0A0A" stroke="#19F0A8" stroke-opacity="0.70"/>
    <text x="16" y="28" class="mono lbl" font-size="14" fill="#FFFFFF">static hub  (bench/)</text>
    <text x="16" y="50" class="mono sub" font-size="11" fill="#C9C9D1">manifests  ·  leaderboards</text>
    <text x="16" y="66" class="mono sub" font-size="11" fill="#7A7A85">scoped UI per backend</text>
  </g>
  <!-- external OpenAI client -->
  <g transform="translate(910,140)">
    <rect width="250" height="76" rx="6" fill="#0A0A0A" stroke="#ffffff" stroke-opacity="0.18" stroke-dasharray="4 4"/>
    <text x="16" y="28" class="mono lbl" font-size="14" fill="#C9C9D1">any OpenAI client</text>
    <text x="16" y="50" class="mono sub" font-size="11" fill="#7A7A85">curl  ·  openai-python</text>
    <text x="16" y="66" class="mono sub" font-size="11" fill="#7A7A85">aider  ·  continue.dev  ·  …</text>
  </g>

  <!-- ====== Layer 2: API ====== -->
  <g class="mono">
    <text x="40" y="252" class="meta" font-size="10" fill="#7A7A85">L2  ::  HTTP SURFACE</text>
  </g>
  <g transform="translate(40,268)">
    <rect width="1120" height="58" rx="6" fill="#0A0A0A" stroke="#00B8FF" stroke-opacity="0.55"/>
    <rect width="1120" height="58" rx="6" fill="#00B8FF" fill-opacity="0.05"/>
    <text x="20" y="36" class="mono h" font-size="16" fill="#FFFFFF">OpenAI-compatible HTTP API</text>
    <text x="370" y="36" class="mono sub" font-size="13" fill="#C9C9D1">/v1/chat/completions  ·  /v1/completions  ·  /v1/models  ·  /v1/embeddings</text>
  </g>

  <!-- ====== Layer 3: systemd service ====== -->
  <g class="mono">
    <text x="40" y="364" class="meta" font-size="10" fill="#7A7A85">L3  ::  PROCESS</text>
  </g>
  <g transform="translate(40,380)">
    <rect width="1120" height="58" rx="6" fill="#0A0A0A" stroke="#D600FF" stroke-opacity="0.85"/>
    <rect width="1120" height="58" rx="6" fill="#D600FF" fill-opacity="0.05"/>
    <circle cx="22" cy="29" r="5" fill="#D600FF" filter="url(#glowM)"/>
    <circle cx="22" cy="29" r="3.5" fill="#D600FF"/>
    <text x="40" y="35" class="mono h" font-size="16" fill="#FFFFFF">systemd  ::  llama-server.service</text>
    <text x="430" y="35" class="mono sub" font-size="12" fill="#C9C9D1">Restart=always  ·  rendered from template  ·  endpoint-pinned argv</text>
  </g>

  <!-- ====== Layer 4: backends ====== -->
  <g class="mono">
    <text x="40" y="476" class="meta" font-size="10" fill="#7A7A85">L4  ::  INFERENCE BACKEND</text>
  </g>
  <g transform="translate(40,492)">
    <rect width="552" height="58" rx="6" fill="#0A0A0A" stroke="#D600FF" stroke-opacity="0.85"/>
    <text x="20" y="35" class="mono h" font-size="15" fill="#FFFFFF">llama.cpp</text>
    <text x="160" y="35" class="mono sub" font-size="12" fill="#C9C9D1">upstream  ·  ggml-cuda</text>
  </g>
  <g transform="translate(608,492)">
    <rect width="552" height="58" rx="6" fill="#0A0A0A" stroke="#00B8FF" stroke-opacity="0.85"/>
    <text x="20" y="35" class="mono h" font-size="15" fill="#FFFFFF">ik_llama.cpp</text>
    <text x="180" y="35" class="mono sub" font-size="12" fill="#C9C9D1">SOTA quants  ·  iq_k</text>
  </g>

  <!-- ====== Layer 5: hardware ====== -->
  <g class="mono">
    <text x="40" y="586" class="meta" font-size="10" fill="#7A7A85">L5  ::  HARDWARE</text>
  </g>
  <g transform="translate(40,602)">
    <rect width="1120" height="22" rx="4" fill="#0A0A0A" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="20" y="16" class="mono lbl" font-size="11" fill="#FFFFFF">CUDA 12.x</text>
    <text x="160" y="16" class="mono sub" font-size="11" fill="#C9C9D1">NVIDIA GPU  ::  RTX 5090 / 5060 Ti tested  ·  Linux or WSL2 host</text>
  </g>

  <!-- ====== Side: config tree ====== -->
  <!-- (skipped to keep the diagram readable; precedence shown via legend below) -->

  <!-- Arrows: L1 -> L2 -->
  <g fill="none" stroke-width="1.6">
    <path d="M170 220 L170 268" stroke="#00B8FF" stroke-opacity="0.85" marker-end="url(#arrowC)"/>
    <path d="M460 220 L460 268" stroke="#D600FF" stroke-opacity="0.85" marker-end="url(#arrowM)"/>
    <path d="M750 220 L750 268" stroke="#19F0A8" stroke-opacity="0.75" marker-end="url(#arrowC)"/>
    <path d="M1035 220 L1035 268" stroke="#7A7A85" stroke-opacity="0.85" marker-end="url(#arrowG)"/>
  </g>

  <!-- Arrows: L2 -> L3 -->
  <g fill="none" stroke-width="1.6">
    <path d="M600 326 L600 380" stroke="#D600FF" stroke-opacity="0.85" marker-end="url(#arrowM)"/>
  </g>

  <!-- Arrows: L3 -> L4 (split) -->
  <g fill="none" stroke-width="1.6">
    <path d="M316 438 L316 492" stroke="#D600FF" stroke-opacity="0.85" marker-end="url(#arrowM)"/>
    <path d="M884 438 L884 492" stroke="#00B8FF" stroke-opacity="0.85" marker-end="url(#arrowC)"/>
  </g>

  <!-- Arrows: L4 -> L5 -->
  <g fill="none" stroke-width="1.6">
    <path d="M316 550 L316 602" stroke="#7A7A85" stroke-opacity="0.85" marker-end="url(#arrowG)"/>
    <path d="M884 550 L884 602" stroke="#7A7A85" stroke-opacity="0.85" marker-end="url(#arrowG)"/>
  </g>

</svg>
